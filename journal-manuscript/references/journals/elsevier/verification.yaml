slug: "elsevier"
display_name: "Elsevier Family"
status: "verified"
verification_scope: "official-template-package"
template_family: "Elsevier elsarticle official template package"
official_source: "https://www.elsevier.com/en-gb/researcher/author/policies-and-guidelines/latex-instructions"
compile_mode: "elsevier"
artifacts:
  tex: "./official_preview.tex"
  pdf: "./official_preview.pdf"
  png: "./official_preview.png"
supporting_files:
  journal_profile: "./profile.md"
  layout_checklist: "./layout-checklist.md"
journal_specific_validation:
  status: "checklist-required"
  checklist_path: "./layout-checklist.md"
  boundary: "Official Elsevier package is available locally, but article-type expectations, citation mode, and supplementary material rules still require confirmation against the target journal's Guide for Authors."
official_template_import:
  source_page: "https://www.elsevier.com/en-gb/researcher/author/policies-and-guidelines/latex-instructions"
  package_url: "https://assets.ctfassets.net/o78em1y1w4i4/4MpsJHO0MOJ2xZuwGTAbOZ/7bc64af36477c5d6cfce335a1f872363/elsarticle.zip"
  additional_package_url: "https://assets.ctfassets.net/o78em1y1w4i4/5uFmLZJTPDMAUjFnHRpjj8/6f19a979146eb93263763d87a894ab0d/els-cas-templates.zip"
  local_package_root: "assets/official-templates/elsevier/template-package"
  selected_template: "elsarticle/elsarticle/elsarticle-template-num.tex"
  reference_mode: "numeric"
verification_checks:
  - id: "class-file-and-template-variant"
    title: "Class file and template variant"
    requirement: "Confirm whether the target journal should use the elsarticle or CAS branch and which official sample is the closest baseline."
  - id: "frontmatter-and-keywords"
    title: "Frontmatter and keywords"
    requirement: "Confirm title page, affiliations, abstract, keywords, and any journal-specific metadata required by the target Guide for Authors."
  - id: "reference-style-alignment"
    title: "Reference style alignment"
    requirement: "Confirm whether the target journal expects numeric or author-year citations and keep the selected Elsevier sample consistent with that guidance."
  - id: "highlights-and-declarations"
    title: "Highlights and declarations"
    requirement: "Confirm whether highlights, graphical abstract, declaration sections, data statements, or biographies are required, optional, or disallowed."
  - id: "figure-table-and-submission-assets"
    title: "Figure, table, and submission assets"
    requirement: "Confirm artwork format, table handling, supplementary files, and upload constraints for source submission."
notes:
  - "Verified against the official Elsevier LaTeX package stored in the local assets folder."
  - "The family-level preview currently remains a conservative family display page while journal-specific previews are already rendered from the imported package."
