slug: "frontiers"
display_name: "Frontiers Family"
status: "verified"
verification_scope: "official-template-package"
template_family: "Frontiers official LaTeX template package"
official_source: "https://www.frontiersin.org/design/zip/Frontiers_LaTeX_Templates.zip"
compile_mode: "frontiers"
artifacts:
  tex: "./official_preview.tex"
  pdf: "./official_preview.pdf"
  png: "./official_preview.png"
supporting_files:
  journal_profile: "./profile.md"
  layout_checklist: "./layout-checklist.md"
journal_specific_validation:
  status: "checklist-required"
  checklist_path: "./layout-checklist.md"
  boundary: "Official Frontiers package is available locally, but specialty labels, declarations, and title-specific reporting requirements still require confirmation against the target journal guidance."
official_template_import:
  source_page: "https://www.frontiersin.org/design/zip/Frontiers_LaTeX_Templates.zip"
  package_url: "https://www.frontiersin.org/design/zip/Frontiers_LaTeX_Templates.zip"
  local_package_root: "assets/official-templates/frontiers/template-package"
  selected_template: "frontiers.tex"
  class_file: "FrontiersinHarvard.cls"
verification_checks:
  - id: "class-file-and-reference-mode"
    title: "Class file and reference mode"
    requirement: "Confirm the target Frontiers title uses the family class path and the appropriate bibliography mode."
  - id: "frontmatter-and-specialty-metadata"
    title: "Front matter and specialty metadata"
    requirement: "Confirm title, authors, affiliations, correspondence, specialty labels, abstract, and keywords follow the target Frontiers title."
  - id: "section-flow-and-open-science-rules"
    title: "Section flow and open science rules"
    requirement: "Confirm section hierarchy and all required open-science reporting sections such as data availability, author contributions, conflict of interest, and funding."
  - id: "figure-table-and-manuscript-rules"
    title: "Figure, table, and manuscript rules"
    requirement: "Confirm figure handling, caption treatment, and manuscript-style layout expectations follow the target Frontiers title."
  - id: "journal-specific-note"
    title: "Journal-specific note"
    requirement: "Use this family baseline only when the exact Frontiers target journal has not yet been fixed; once the venue is known, tighten the manuscript against that title's live guidance."
notes:
  - "Verified against the official Frontiers LaTeX template package stored in the local assets folder."
  - "The family-level preview currently uses a real template-backed package root, but title-specific reporting sections still need manual confirmation."
