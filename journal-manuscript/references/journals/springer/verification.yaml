    requirement: "Confirm the selected bibliography style option matches the target family or journal guidance."
  - id: "journal-specific-note"
    title: "Journal-specific note"
    requirement: "Use this family baseline only when the exact Springer journal has not yet been fixed; once the venue is known, tighten the manuscript against that journal's live guidance."
notes:
